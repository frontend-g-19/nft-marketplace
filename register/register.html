<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="register.css" />
    <link rel="shortcut icon" href="/img/Storefront.png" />

    <title>NFT Marketplace</title>
  </head>
  <body>
    <nav>
      <a href="/index.html">
        <img src="/img/logo.png" alt="logotip" />
      </a>

      <div class="nav-right">
        <ul>
          <li>Marketplace</li>
          <li>Rankings</li>
          <li>Connect a wallet</li>
        </ul>

        <button>
          <img src="/img/User.png" alt="user-icon" />
          Sign Up
        </button>
      </div>
    </nav>

    <section class="register container">
      <img src="/img/register-hero.png" alt="register-hero" />

      <div class="signup-form">
        <h1>Create account</h1>
        <p>
          Welcome! enter your details and start creating, collecting and selling
          NFTs.
        </p>

        <form>
          <div>
            <img src="/img/User-register.png" alt="user-icon" />
            <input type="text" placeholder="Username" />
          </div>

          <div>
            <img src="/img/Envelope-register.png" alt="user-icon" />
            <input type="email" placeholder="Email Address" />
          </div>

          <div>
            <img src="/img/LockKey-register.png" alt="user-icon" />
            <input type="password" placeholder="Password" />
          </div>

          <div>
            <img src="/img/LockKey-register.png" alt="user-icon" />
            <input type="password" placeholder="Confirm Password" />
          </div>

          <button>Create account</button>
        </form>
      </div>
    </section>
  </body>
</html>
