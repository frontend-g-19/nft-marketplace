<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="wallet.css" />
    <link rel="shortcut icon" href="/img/Storefront.png" />

    <title>NFT Marketplace</title>
  </head>
  <body>
    <nav>
      <a href="/index.html">
        <img src="/img/logo.png" alt="logotip" />
      </a>

      <div class="nav-right">
        <ul>
          <li>Marketplace</li>
          <li>Rankings</li>
          <li>Connect a wallet</li>
        </ul>

        <button>
          <img src="/img/User.png" alt="user-icon" />
          Sign Up
        </button>
      </div>
    </nav>

    <section class="wallet container">
      <img src="/img/wallet-hero.png" alt="register-hero" />

      <div class="connections">
        <h1>Connect wallet</h1>
        <p>
          Choose a wallet you want to connect. There are several wallet
          providers.
        </p>

        <div class="wallet-btns">
          <button>
            <img src="../img/Metamask.png" alt="Metamask" />
            Metamask
          </button>
          <button>
            <img src="../img/WalletConnect.png" alt="WalletConnect" />
            Wallet Connect
          </button>
          <button>
            <img src="../img/Coinbase.png" alt="Coinbase" />
            Coinbase
          </button>
        </div>
      </div>
    </section>
  </body>
</html>
