<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="rankings.css" />
    <title>Document</title>
  </head>
  <body>
    <nav>
      <a href="/index.html">
        <img src="/img/logo.png" alt="logotip" />
      </a>

      <div class="nav-right">
        <ul>
          <li>Marketplace</li>
          <li>Rankings</li>
          <li>Connect a wallet</li>
        </ul>

        <button>
          <img src="/img/User.png" alt="user-icon" />
          Sign Up
        </button>
      </div>
    </nav>

    <section class="rankings container">
      <h1>Top Creators</h1>
      <p>Check out top ranking NFT artists on the NFT Marketplace.</p>

      <div class="table">
        <div class="tabs">
          <button>Today</button>
          <button>This Week</button>
          <button>This Month</button>
          <button>All Time</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Artist</th>
              <th>Change</th>
              <th>NFTs Sold</th>
              <th>Volume</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>
                <span>1</span>
              </td>
              <td>
                <img
                  src="../img/rankings/Avatar Placeholder.png"
                  alt="Avatar"
                />
                Jaydon Ekstrom Bothman
              </td>
              <td>+1.41%</td>
              <td>602</td>
              <td>12.4 ETH</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </body>
</html>
